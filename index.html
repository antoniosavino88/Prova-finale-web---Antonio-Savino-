<!DOCTYPE html>
<html lang="it" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Spese Personali</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-body">
    <!-- Header -->
    <header class="py-4 shadow-sm mb-4 bg-body-tertiary">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="h3 mb-0 fw-bold bg-gradient-text"><i class="bi bi-wallet2 me-2"></i>Le Mie Spese</h1>
            <div class="user-profile">
                <i class="bi bi-person-circle fs-3 text-secondary"></i>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <!-- Summary Section -->
        <section class="row mb-4 g-4" id="summary-section">
            <div class="col-md-6">
                <div class="card summary-card border-0 shadow-sm h-100 bg-primary text-white">
                    <div class="card-body d-flex flex-column justify-content-center">
                        <h6 class="card-title text-uppercase fw-semibold mb-1 opacity-75">Totale Spese</h6>
                        <h2 class="display-6 fw-bold mb-0" id="total-amount">€ 0.00</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card summary-card border-0 shadow-sm h-100 bg-success text-white">
                    <div class="card-body d-flex flex-column justify-content-center">
                        <h6 class="card-title text-uppercase fw-semibold mb-1 opacity-75">Numero Spese</h6>
                        <h2 class="display-6 fw-bold mb-0" id="total-count">0</h2>
                    </div>
                </div>
            </div>
        </section>

        <section class="row g-4">
            <!-- Add Expense Form -->
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm sticky-top" style="top: 2rem;">
                    <div class="card-body p-4">
                        <h4 class="card-title fw-bold mb-4">Aggiungi Spesa</h4>
                        <form id="expense-form">
                            <div class="mb-3">
                                <label for="descrizione" class="form-label fw-medium">Descrizione</label>
                                <input type="text" class="form-control" id="descrizione" placeholder="Es. Spesa supermercato" required>
                            </div>
                            <div class="mb-3">
                                <label for="importo" class="form-label fw-medium">Importo (€)</label>
                                <input type="number" class="form-control" id="importo" placeholder="0.00" step="0.01" min="0.01" required>
                            </div>
                            <div class="mb-3">
                                <label for="categoria" class="form-label fw-medium">Categoria</label>
                                <select class="form-select" id="categoria" required>
                                    <option value="" disabled selected>Scegli una categoria...</option>
                                    <option value="Casa">Casa</option>
                                    <option value="Cibo">Cibo</option>
                                    <option value="Trasporti">Trasporti</option>
                                    <option value="Tempo libero">Tempo libero</option>
                                    <option value="Salute">Salute</option>
                                    <option value="Altro">Altro</option>
                                </select>
                            </div>
                            <div class="mb-4">
                                <label for="data" class="form-label fw-medium">Data</label>
                                <input type="date" class="form-control" id="data" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm action-btn">
                                <i class="bi bi-plus-lg me-1"></i> Aggiungi Spesa
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Expense List & Filters -->
            <div class="col-lg-8">
                <!-- Filters -->
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body p-4">
                        <div class="row g-3">
                            <div class="col-md-7">
                                <div class="input-group">
                                    <span class="input-group-text bg-body-tertiary"><i class="bi bi-search text-muted"></i></span>
                                    <input type="text" class="form-control" id="search-input" placeholder="Cerca per descrizione...">
                                </div>
                            </div>
                            <div class="col-md-5">
                                <select class="form-select" id="filter-category">
                                    <option value="Tutte">Tutte le categorie</option>
                                    <option value="Casa">Casa</option>
                                    <option value="Cibo">Cibo</option>
                                    <option value="Trasporti">Trasporti</option>
                                    <option value="Tempo libero">Tempo libero</option>
                                    <option value="Salute">Salute</option>
                                    <option value="Altro">Altro</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Expense List -->
                <h4 class="mb-3 fw-bold ps-1">Ultime Spese</h4>
                <div id="expense-list" class="d-flex flex-column gap-3">
                    <!-- Cards will be injected here by JS -->
                </div>
                
                <!-- Empty state template (hidden by default initially handled by JS) -->
                <div id="empty-state" class="text-center py-5 d-none">
                    <i class="bi bi-clipboard-x display-1 text-muted opacity-50 mb-3"></i>
                    <h5 class="text-muted">Nessuna spesa trovata</h5>
                    <p class="text-muted small">Aggiungi una nuova spesa per iniziare a monitorare il tuo budget.</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Edit Modal -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="editModalLabel">Modifica Spesa</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="edit-form">
                        <input type="hidden" id="edit-id">
                        <div class="mb-3">
                            <label for="edit-descrizione" class="form-label fw-medium">Descrizione</label>
                            <input type="text" class="form-control" id="edit-descrizione" required>
                        </div>
                        <div class="mb-3">
                            <label for="edit-importo" class="form-label fw-medium">Importo (€)</label>
                            <input type="number" class="form-control" id="edit-importo" step="0.01" min="0.01" required>
                        </div>
                        <div class="mb-3">
                            <label for="edit-categoria" class="form-label fw-medium">Categoria</label>
                            <select class="form-select" id="edit-categoria" required>
                                <option value="Casa">Casa</option>
                                <option value="Cibo">Cibo</option>
                                <option value="Trasporti">Trasporti</option>
                                <option value="Tempo libero">Tempo libero</option>
                                <option value="Salute">Salute</option>
                                <option value="Altro">Altro</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label for="edit-data" class="form-label fw-medium">Data</label>
                            <input type="date" class="form-control" id="edit-data" required>
                        </div>
                        <div class="d-flex justify-content-end gap-2">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annulla</button>
                            <button type="submit" class="btn btn-primary fw-bold">Salva Modifiche</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Script -->
    <script src="script.js"></script>
</body>
</html>
